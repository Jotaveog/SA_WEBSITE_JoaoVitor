      crossorigin="anonymous"
    ></script>
  </head>
<body>
   <header> 
    
      <nav class="navbar navbar-expand-lg bg-black" data-bs-theme="dark">
        
        <div class="container-fluid">
        <a class="navbar-brand brand-flex">
          <h1>ViralWave</h1>
          <span class="slogan">Impulsionando sua presença online com estrategias que geram resultados.</span>
        </a>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./serviços.html">Serviços</a>

              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./cases.html">Cases</a>

             </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./contato.html">Contato</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="contato">
        <h2>Contato</h2>
        <p>Fale com a ViralWave e impulsione sua presença digital com estratégias que convertem.</p>
      </section>

      <section class="contato-grid">
        <article class="contato-form-card card-shadow">
          <h3>Nos envie uma mensagem</h3>
          <form action="#" method="post" class="contato-form">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" placeholder="Seu nome completo" required />

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@exemplo.com" required />

            <label for="phone">Telefone</label>
            <input type="tel" id="phone" name="phone" placeholder="(27) 99999-9999" required />

            <label for="message">Mensagem</label>
            <textarea id="message" name="message" rows="5" placeholder="Como podemos ajudar sua marca?" required></textarea>

            <button type="submit" class="butao">Enviar mensagem</button>
          </form>
        </article>
      </section>
    </main>

   <hr />
  <footer>
    <p>viralwave@gmail.com</p>
    <p>(27) 3323-6333</p>
    <p>2026</p>
  </footer>
